model:
  backbone: "facebookresearch/dinov2"
  variant: "dinov2_vits14"
  backbone_dim: 384
  projection_dim: 128
  fine_tuned_weights: "data/embeddings/fine_tuned_model.pt"
  checkpoint_dir: "data/embeddings/checkpoints"

data:
  raw_dir: "data/raw"
  embeddings_dir: "data/embeddings"
  symptoms:
    burnt_appearance:
      raw_folder: "Burnt appearance"
      display_name: "Burnt Appearance"
    fruit_bored_holes:
      raw_folder: "Fruit_bored_holes"
      display_name: "Fruit Bored Holes"
    fruit_cracking:
      raw_folder: "Fruit_cracking"
      display_name: "Fruit Cracking"
    galls:
      raw_folder: "Galls"
      display_name: "Galls"
    leaf_chewed_portion:
      raw_folder: "Leaf chewed portion"
      display_name: "Leaf Chewed Portion"
    leaf_color_change:
      raw_folder: "Leaf_color_change"
      display_name: "Leaf Color Change"
    leaf_healthy:
      raw_folder: "Leaf_Healthy"
      display_name: "Leaf Healthy"
    leaf_shape_change:
      raw_folder: "Leaf_shape_change"
      display_name: "Leaf Shape Change"
    stem_bored_holes:
      raw_folder: "Stem_bored_holes"
      display_name: "Stem Bored Holes"
    stem_cracking:
      raw_folder: "Stem_cracking"
      display_name: "Stem Cracking"

transform:
  resize: 256
  crop: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

similarity:
  top_n_mean: 5
  thresholds:
    high: 80
    medium: 60

validation:
  allowed_formats: ["image/jpeg", "image/png", "image/jpg"]
  max_file_size_mb: 100
  min_brightness: 30
  max_brightness: 240
  min_laplacian_var: 15

training:
  epochs: 10
  batch_size: 16
  triplet_margin: 0.3
  phase1_lr: 0.001
  phase2_backbone_lr: 0.00001
  phase2_projector_lr: 0.0001
